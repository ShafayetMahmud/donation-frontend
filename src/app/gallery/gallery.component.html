<!-- Gallery wrapper (always visible when not loading/error) -->
<ng-container *ngIf="!loading && !error">

  <div class="gallery-wrapper">

    <!-- EMPTY STATE -->
    <div *ngIf="images.length === 0" class="empty-state">
      <mat-icon>{{ 'GALLERY.LIBRARY' | translate }}</mat-icon>
      <p>{{ 'GALLERY.NO_PHOTOS' | translate }}</p>
      <p class="subtitle">{{ 'GALLERY.UPLOAD' | translate }}</p>
    </div>

    <!-- GRID -->
    <div class="photo-grid" *ngIf="images.length > 0">
      <div
        class="photo-tile"
        *ngFor="let img of images; let i = index"
        (click)="openLightbox(i)"
      >
        <img [src]="img" alt="Gallery image" />
      </div>
    </div>

    <!-- UPLOAD BUTTON (ALWAYS VISIBLE) -->
    <div class="upload-section">
      <button mat-raised-button color="primary" (click)="fileInput.click()">
        <mat-icon>{{ 'GALLERY.ALTERNATE' | translate }}</mat-icon>
        <span>{{ 'GALLERY.ADD_PHOTOS' | translate }}</span>
      </button>
    </div>

  </div>
</ng-container>

<!-- LIGHTBOX -->
<div class="lightbox" *ngIf="lightboxOpen">
  <div class="backdrop" (click)="closeLightbox()"></div>

  <button class="close-btn" (click)="closeLightbox()">✕</button>
  <button class="nav left" (click)="prev()">‹</button>

  <img
    class="lightbox-image"
    [src]="images[selectedIndex]"
    alt="Expanded photo"
  />

  <button class="nav right" (click)="next()">›</button>
</div>

<input
  #fileInput
  type="file"
  accept="image/*"
  (change)="onFileSelected($event)"
  hidden
/>
